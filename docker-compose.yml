services:
  postgres:
    image: postgres:16-alpine
    container_name: esg_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-esg}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-esg}
      POSTGRES_DB: ${POSTGRES_DB:-esg}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-esg} -d ${POSTGRES_DB:-esg}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - esg_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: esg_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: ${APP_ENV:-development}
      APP_NAME: ${APP_NAME:-esg-ai-platform}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:5173}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-esg}:${POSTGRES_PASSWORD:-esg}@postgres:5432/${POSTGRES_DB:-esg}
      DB_ECHO: ${DB_ECHO:-false}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-10}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-20}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      VECTOR_STORE_PATH: /app/data/faiss
      DOCUMENTS_PATH: /app/data/documents
      HF_HOME: /app/data/hf_cache
      HF_HUB_CACHE: /app/data/hf_cache
      TRANSFORMERS_CACHE: /app/data/hf_cache
      SENTENCE_TRANSFORMERS_HOME: /app/data/hf_cache
      TOKENIZERS_PARALLELISM: "false"
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - backend_data:/app/data
    networks:
      - esg_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: esg_frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    networks:
      - esg_net

volumes:
  postgres_data:
  backend_data:

networks:
  esg_net:
    driver: bridge
