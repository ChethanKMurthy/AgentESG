services:
  postgres:
    image: postgres:16-alpine
    container_name: esg_postgres_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - esg_net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M

  backend:
    image: ${BACKEND_IMAGE:-capstone-backend:latest}
    build:
      context: ./backend
      dockerfile: Dockerfile.prod
    container_name: esg_backend_prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_NAME: ${APP_NAME:-esg-ai-platform}
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DATABASE_URL: ${DATABASE_URL}
      DB_POOL_SIZE: ${DB_POOL_SIZE:-20}
      DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-40}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-7}
      EMBEDDING_MODEL: ${EMBEDDING_MODEL:-sentence-transformers/all-MiniLM-L6-v2}
      VECTOR_STORE_PATH: /app/data/faiss
      DOCUMENTS_PATH: /app/data/documents
      HF_HOME: /app/data/hf_cache
      SENTENCE_TRANSFORMERS_HOME: /app/data/hf_cache
      TOKENIZERS_PARALLELISM: "false"
      GUNICORN_WORKERS: ${GUNICORN_WORKERS:-4}
      GUNICORN_TIMEOUT: ${GUNICORN_TIMEOUT:-120}
      FORWARDED_ALLOW_IPS: "*"
    volumes:
      - backend_data:/app/data
    networks:
      - esg_net
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 3072M
      replicas: ${BACKEND_REPLICAS:-1}

  frontend:
    image: ${FRONTEND_IMAGE:-capstone-frontend:latest}
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE: /api
    container_name: esg_frontend_prod
    restart: always
    depends_on:
      - backend
    ports:
      - "${PUBLIC_PORT:-80}:80"
    networks:
      - esg_net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256M

volumes:
  postgres_data:
  backend_data:

networks:
  esg_net:
    driver: bridge
